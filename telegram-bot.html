<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🤖 Ania Bot - MediTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; font-size: 2rem; text-align: center; margin-bottom: 5px; }
        h1 span { background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 30px; font-size: 0.9rem; }
        .status { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #4ade80; }
        .status .label { color: rgba(255,255,255,0.4); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .status .value { color: #4ade80; font-size: 1.1rem; margin-top: 5px; font-family: 'Courier New', monospace; word-break: break-all; }
        .status .value.off { color: #f87171; }
        .logs { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #a5b4fc; }
        .logs::-webkit-scrollbar { width: 6px; }
        .logs::-webkit-scrollbar-thumb { background: #f5576c; border-radius: 10px; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-entry .time { color: rgba(255,255,255,0.3); margin-right: 10px; }
        .log-entry .user { color: #60a5fa; }
        .log-entry .bot { color: #f472b6; }
        .log-entry .error { color: #f87171; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; flex: 1; min-width: 120px; font-size: 0.9rem; }
        .btn-start { background: linear-gradient(135deg, #4ade80, #22d3ee); color: #1a1a2e; }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-stop { background: linear-gradient(135deg, #f87171, #f5576c); color: white; }
        .btn-stop:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3); }
        .btn-stop:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-test { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-test:hover { background: rgba(255,255,255,0.2); }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; text-decoration: none; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-telegram:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3); }
        .token-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 15px; color: white; width: 100%; font-family: 'Courier New', monospace; font-size: 0.8rem; margin-bottom: 10px; outline: none; }
        .token-input:focus { border-color: #f5576c; }
        .token-input::placeholder { color: rgba(255,255,255,0.3); }
        .footer { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.7rem; margin-top: 20px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 600; margin-left: 8px; }
        .badge-on { background: #4ade80; color: #1a1a2e; }
        .badge-off { background: #f87171; color: white; }
        .volver { color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        .volver:hover { color: rgba(255,255,255,0.6); }
        .proxy-info { background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; border-radius: 10px; padding: 12px; margin-bottom: 15px; color: #4ade80; font-size: 0.8rem; }
        .proxy-info i { margin-right: 8px; }
        .uptime { color: #60a5fa; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="volver"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>

    <h1>🤖 <span>Ania</span> Bot</h1>
    <p class="subtitle">Asistente virtual de MediTech en Telegram</p>

    <div class="proxy-info">
        <i class="fas fa-cloud"></i> 
        Bot funcionando con Cloudflare Worker
        <br /><span style="font-size: 0.7rem; opacity: 0.7;">Tiempo activo: <span id="uptimeDisplay" class="uptime">0h 0m 0s</span></span>
    </div>

    <div class="status">
        <div class="label">📌 TOKEN DE TELEGRAM</div>
        <input type="text" class="token-input" id="tokenInput" placeholder="8932505027:AAFkR4ZVC_hFcuc4YIhEmEIvGaIDr6yB7L0" />
    </div>

    <div class="status">
        <div class="label">📊 ESTADO DEL BOT</div>
        <div class="value" id="statusValue">⏸️ Detenido <span class="badge badge-off" id="statusBadge">OFF</span></div>
    </div>

    <div class="logs" id="logsContainer">
        <div class="log-entry"><span class="time">📌</span> Esperando iniciar el bot...</div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="startBot()">▶️ Iniciar Bot</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopBot()" disabled>⏹️ Detener</button>
        <button class="btn btn-test" onclick="testBot()">📤 Probar</button>
        <a href="https://t.me/AniaAsistenteBot" target="_blank" class="btn btn-telegram">
            <i class="fab fa-telegram"></i> Abrir en Telegram
        </a>
    </div>

    <div class="footer">MediTech - Salud y Tecnología</div>
</div>

<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================

const WORKER_URL = "https://telegram-proxy.calm291094.workers.dev";
const GITHUB_USER = "calm291094-del";
const GITHUB_REPO = "meditech-tienda";

let botInterval = null;
let isRunning = false;
let lastUpdateId = 0;
let token = '';
let startTime = Date.now();

// ✅ DECLARADO UNA SOLA VEZ
let lastResponse = Date.now();
let reinicioIntentos = 0;

// ============================================================
// FUNCIÓN PARA LLAMAR AL WORKER DE CLOUDFLARE (MEJORADA)
// ============================================================
async function callWorker(method, data = {}) {
    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: token,
                method: method,
                data: data
            })
        });

        // Verificar si la respuesta es JSON
        const contentType = response.headers.get('content-type');
        if (contentType && contentType.includes('application/json')) {
            return await response.json();
        } else {
            // Si no es JSON, leer como texto y devolver un error estructurado
            const text = await response.text();
            console.warn('Respuesta no JSON del Worker:', text);
            return { 
                ok: false, 
                error: `Error del Worker (${response.status}): ${text.substring(0, 100)}` 
            };
        }
    } catch (error) {
        console.error('Error en Worker:', error);
        return { ok: false, error: error.message };
    }
}

    // ============================================================
    // ENVIAR MENSAJE A TELEGRAM (USANDO WORKER)
    // ============================================================
    async function sendTelegramMessage(chatId, text) {
        const cleanText = text.replace(/<[^>]*>/g, '').trim();
        const result = await callWorker('sendMessage', {
            chat_id: chatId,
            text: cleanText,
            parse_mode: ''
        });
        return result.ok;
    }

// ============================================================
// OBTENER ACTUALIZACIONES (USANDO WORKER) - CON MONITOREO 24/7
// ============================================================
async function getUpdates() {
    try {
        const result = await callWorker('getUpdates', {
            offset: lastUpdateId + 1,
            timeout: 30
        });

        if (result.ok && result.result.length > 0) {
            for (let update of result.result) {
                lastUpdateId = update.update_id;
                if (update.message && update.message.text) {
                    const chatId = update.message.chat.id;
                    const userName = update.message.from.first_name || 'Usuario';
                    const messageText = update.message.text;
                    
                    addLog(`${userName}: ${messageText}`, 'user');
                    
                    if (!messageText.startsWith('/')) {
                        const response = await getAniaResponse(messageText);
                        const sent = await sendTelegramMessage(chatId, response);
                        if (sent) {
                            addLog(`Ania: ${response.substring(0, 50)}...`, 'bot');
                            // ✅ ACTUALIZAR TIEMPO DE ÚLTIMA RESPUESTA EXITOSA
                            lastResponse = Date.now();
                        } else {
                            addLog('❌ No se pudo enviar mensaje', 'error');
                        }
                    }
                }
            }
        }
        
        // ✅ ACTUALIZAR TIEMPO DE ÚLTIMA PETICIÓN EXITOSA (incluso si no hay mensajes)
        lastResponse = Date.now();
        return result.ok;
        
    } catch (error) {
        addLog(`❌ Error en getUpdates: ${error.message}`, 'error');
        return false;
    }
}

    // ============================================================
    // PERSONALIDAD DE ANIA
    // ============================================================

    const ANIA_PERSONALIDAD = `
    Eres Ania, la asistente virtual de MediTech. Tienes 20 años.

    Tu personalidad:
    - Alegre, perceptiva y entusiasta
    - Te encanta el café ☕, el anime 🎌, los zombies 🧟 y la astronomía 🔭
    - Usas frases como "sorbo de café pensativo", "waku waku"
    - Hablas en español con calidez y emojis

    Reglas:
    - NUNCA uses etiquetas HTML en tus respuestas
    - Usa solo texto plano con emojis
    - Si preguntan por precios: "Visita nuestra web: https://calm291094-del.github.io/meditech-tienda/"
    - Si preguntan por medicamentos: "Siempre consulta a un médico"
    - Siempre terminas con calidez y positividad
    `;

    // ============================================================
    // OBTENER PRODUCTOS DESDE GITHUB
    // ============================================================

    async function obtenerProductos() {
        try {
            const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/productos.json?t=${Date.now()}`;
            const res = await fetch(url);
            if (!res.ok) return [];
            const data = await res.json();
            return data.productos || [];
        } catch (e) {
            return [];
        }
    }

    // ============================================================
    // GENERAR RESPUESTA DE ANIA
    // ============================================================

    async function getAniaResponse(userMessage) {
        const productos = await obtenerProductos();

        let contexto = "Productos disponibles:\n";
        if (productos.length > 0) {
            productos.slice(0, 10).forEach(p => {
                const estado = p.available !== false && p.stock > 0 ? '✅' : '❌';
                contexto += `${estado} ${p.name} - $${p.price}\n`;
            });
        } else {
            contexto += "No hay productos disponibles.\n";
        }
        contexto += "\nWeb: https://calm291094-del.github.io/meditech-tienda/";

        try {
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: ANIA_PERSONALIDAD + '\n\n' + contexto },
                        { role: 'user', content: userMessage }
                    ],
                    model: 'openai',
                    seed: Math.floor(Math.random() * 100000)
                })
            });

            if (response.ok) {
                let texto = await response.text();
                texto = texto.replace(/<[^>]*>/g, '');
                texto = texto.replace(/```[\s\S]*?```/g, '').trim();
                texto = texto.replace(/\*\*(.*?)\*\*/g, '$1');
                if (texto.length > 10) return texto;
            }
        } catch (e) {
            console.error('Error en IA:', e);
        }

        return getLocalResponse(userMessage);
    }

    // ============================================================
    // RESPUESTAS LOCALES
    // ============================================================

    function getLocalResponse(message) {
        const lower = message.toLowerCase();

        if (lower.includes('enalapril')) {
            return "💊 Enalapril: medicamento para presión arterial. Consulta a tu médico. Más info en nuestra web. ☕️";
        }
        if (lower.includes('paracetamol')) {
            return "💊 Paracetamol: analgésico y antipirético. Dosis: 500mg cada 6-8 horas. Consulta a tu médico. ☕️";
        }
        if (lower.includes('hola') || lower.includes('buenas')) {
            return "¡Hola! ☕️ Soy Ania, tu asistente de MediTech. Visita nuestra web: https://calm291094-del.github.io/meditech-tienda/ ✨";
        }
        if (lower.includes('precio') || lower.includes('cuesta')) {
            return "💰 Precios actualizados en nuestra web: https://calm291094-del.github.io/meditech-tienda/ 😊";
        }
        if (lower.includes('café') || lower.includes('cafe')) {
            return "☕ ¡El café es mi debilidad! Mi favorito es un Ethiopiano Yirgacheffe en pour-over. ¿Te gusta el café?";
        }
        if (lower.includes('anime') || lower.includes('isekai')) {
            return "🎌 ¡Waku waku! Me encanta el anime. Mi favorito es Tensei Slime. ¿Has visto alguna serie buena?";
        }
        if (lower.includes('adiós') || lower.includes('chao')) {
            return "¡Hasta luego! ☕️ Recuerda: 'Sonríe, mañana será bonito'. ¡Cuídate! ✨";
        }

        const defaults = [
            "¡Interesante! ☕️ ¿Qué más necesitas saber de MediTech?",
            "Eso me recuerda a un buen café. ¿Quieres que te ayude con algo de la tienda?",
            "¡Waku waku! ¿Podrías darme más detalles? 📝",
            "Pan, café y anime solucionan el 80% de los problemas. 🍞☕️"
        ];
        return defaults[Math.floor(Math.random() * defaults.length)];
    }

    // ============================================================
    // FUNCIONES DEL BOT
    // ============================================================

    function addLog(message, type = 'info') {
        const container = document.getElementById('logsContainer');
        const time = new Date().toLocaleTimeString();
        const emoji = { info: '📌', user: '👤', bot: '🤖', error: '❌', success: '✅', warning: '⚠️' };
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="time">${emoji[type] || '📌'}</span> <span class="${type}">${message}</span>`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
    }

    async function testBot() {
        if (!token) {
            addLog('❌ Ingresa el token primero', 'error');
            alert('❌ Por favor, ingresa el token de Telegram');
            return;
        }

        addLog('📤 Probando conexión...', 'info');
        const result = await callWorker('getMe');
        if (result.ok) {
            addLog(`✅ Bot @${result.result.username} está activo`, 'success');
            alert(`✅ Bot @${result.result.username} está activo!`);
        } else {
            addLog(`❌ Error: ${result.error || 'Token inválido'}`, 'error');
            alert('❌ No se pudo conectar');
        }
    }

    function startBot() {
        token = document.getElementById('tokenInput').value.trim();
        if (!token) {
            addLog('❌ Ingresa el token de Telegram primero', 'error');
            alert('❌ Por favor, ingresa el token de Telegram');
            return;
        }

        if (isRunning) {
            addLog('⚠️ El bot ya está corriendo', 'warning');
            return;
        }

        addLog('🚀 Iniciando bot...', 'info');

        callWorker('getMe').then(result => {
            if (result.ok) {
                isRunning = true;
                document.getElementById('statusValue').innerHTML = `✅ Conectado <span class="badge badge-on">ON</span>`;
                document.getElementById('btnStart').disabled = true;
                document.getElementById('btnStop').disabled = false;
                addLog(`✅ Bot @${result.result.username} iniciado`, 'success');
                addLog('📱 Escribe en Telegram para probarlo', 'info');

                lastUpdateId = 0;
                botInterval = setInterval(async () => {
                    await getUpdates();
                }, 5000);
            } else {
                addLog(`❌ Error: ${result.error || 'Token inválido'}`, 'error');
                alert('❌ Token inválido o Worker no disponible');
            }
        });
    }

    function stopBot() {
        if (botInterval) {
            clearInterval(botInterval);
            botInterval = null;
        }
        isRunning = false;
        document.getElementById('statusValue').innerHTML = `⏸️ Detenido <span class="badge badge-off">OFF</span>`;
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        addLog('⏹️ Bot detenido', 'info');
    }

    // ============================================================
    // KEEP ALIVE Y AUTO-INICIO
    // ============================================================

    setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const hours = Math.floor(elapsed / 3600);
        const minutes = Math.floor((elapsed % 3600) / 60);
        const seconds = elapsed % 60;
        const uptimeElement = document.getElementById('uptimeDisplay');
        if (uptimeElement) {
            uptimeElement.textContent = `${hours}h ${minutes}m ${seconds}s`;
        }
    }, 1000);

    document.addEventListener('DOMContentLoaded', function() {
        const savedToken = localStorage.getItem('ania_telegram_token');
        if (savedToken) {
            document.getElementById('tokenInput').value = savedToken;
            addLog('📌 Token cargado automáticamente', 'info');
            setTimeout(startBot, 2000);
        }
    });

    document.getElementById('tokenInput').addEventListener('change', function() {
        localStorage.setItem('ania_telegram_token', this.value.trim());
    });

    setInterval(() => {
        fetch(window.location.href).catch(() => {});
    }, 180000);

// ============================================================
// SISTEMA DE REINICIO AUTOMÁTICO - PARA RENDER
// ============================================================

// 1. Verificar cada 30 segundos si el bot está corriendo
setInterval(() => {
    if (!isRunning && token) {
        console.log('🔄 Bot detenido, reiniciando...');
        addLog('🔄 Bot detenido, reiniciando...', 'warning');
        startBot();
    }
}, 30000);

// 3. Actualizar lastResponse cuando se recibe un mensaje
// Agrega esto en la función getUpdates(), después de procesar un mensaje:
// lastResponse = Date.now();

    // ============================================================
    // SISTEMA DE REINICIO AUTOMÁTICO - PARA RENDER
    // ============================================================

    // 1. Verificar cada 30 segundos si el bot está corriendo
    setInterval(() => {
        if (!isRunning && token) {
            console.log('🔄 Bot detenido, reiniciando...');
            addLog('🔄 Bot detenido, reiniciando...', 'warning');
            startBot();
        }
    }, 30000);

    // 2. Recargar la página si el bot no responde después de 2 minutos
    setInterval(() => {
        if (isRunning && (Date.now() - lastResponse > 120000)) {
            console.log('🔄 Bot sin respuesta, recargando página...');
            location.reload();
        }
    }, 60000);

    // 3. Actualizar lastResponse cuando se recibe un mensaje
    // Agrega esto en la función getUpdates(), después de procesar un mensaje:
    // lastResponse = Date.now();

    // ============================================================
    // 📌 REGISTRO DEL SERVICE WORKER (para mantener la página activa)
    // ============================================================
    
    // Registrar service worker para mantener la página activa
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('✅ Service Worker registrado correctamente'))
            .catch((err) => console.log('⚠️ Service Worker no disponible:', err));
    }

    // ============================================================
    // 📌 GUARDAR ESTADO DEL BOT (para recuperar después de recargar)
    // ============================================================
    
    // Guardar estado antes de recargar o cerrar
    window.addEventListener('beforeunload', function() {
        localStorage.setItem('bot_running', isRunning ? 'true' : 'false');
        localStorage.setItem('bot_token', token || '');
    });

    // Recuperar estado después de recargar
    document.addEventListener('DOMContentLoaded', function() {
        const wasRunning = localStorage.getItem('bot_running');
        const savedToken = localStorage.getItem('bot_token');
        
        if (wasRunning === 'true' && savedToken) {
            addLog('🔄 Recuperando estado anterior del bot...', 'info');
            // El token ya se cargará en el auto-inicio
        }
    });

    console.log('🔥 Sistema 24/7 completamente activo');
    console.log('📱 Bot funcionando con Cloudflare Worker + Service Worker');
</script>


</body>
</html>

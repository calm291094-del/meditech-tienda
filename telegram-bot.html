<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Ania Bot - MediTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        h1 { color: #fff; font-size: 2rem; text-align: center; margin-bottom: 5px; }
        h1 span { background: linear-gradient(135deg, #f093fb, #f5576c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: rgba(255,255,255,0.5); text-align: center; margin-bottom: 30px; font-size: 0.9rem; }
        .status { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; margin-bottom: 15px; border-left: 4px solid #4ade80; }
        .status .label { color: rgba(255,255,255,0.4); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .status .value { color: #4ade80; font-size: 1.1rem; margin-top: 5px; font-family: 'Courier New', monospace; word-break: break-all; }
        .status .value.off { color: #f87171; }
        .logs { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 20px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; font-family: 'Courier New', monospace; font-size: 0.8rem; color: #a5b4fc; }
        .logs::-webkit-scrollbar { width: 6px; }
        .logs::-webkit-scrollbar-thumb { background: #f5576c; border-radius: 10px; }
        .log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-entry .time { color: rgba(255,255,255,0.3); margin-right: 10px; }
        .log-entry .user { color: #60a5fa; }
        .log-entry .bot { color: #f472b6; }
        .log-entry .error { color: #f87171; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; flex: 1; min-width: 120px; font-size: 0.9rem; }
        .btn-start { background: linear-gradient(135deg, #4ade80, #22d3ee); color: #1a1a2e; }
        .btn-start:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-stop { background: linear-gradient(135deg, #f87171, #f5576c); color: white; }
        .btn-stop:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(245, 87, 108, 0.3); }
        .btn-stop:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-test { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-test:hover { background: rgba(255,255,255,0.2); }
        .btn-telegram { background: linear-gradient(135deg, #0088cc, #006699); color: white; }
        .btn-telegram:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3); }
        .token-input { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 15px; color: white; width: 100%; font-family: 'Courier New', monospace; font-size: 0.8rem; margin-bottom: 10px; outline: none; }
        .token-input:focus { border-color: #f5576c; }
        .token-input::placeholder { color: rgba(255,255,255,0.3); }
        .footer { text-align: center; color: rgba(255,255,255,0.2); font-size: 0.7rem; margin-top: 20px; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.6rem; font-weight: 600; margin-left: 8px; }
        .badge-on { background: #4ade80; color: #1a1a2e; }
        .badge-off { background: #f87171; color: white; }
        .volver { color: rgba(255,255,255,0.3); text-decoration: none; font-size: 0.8rem; display: inline-block; margin-bottom: 15px; }
        .volver:hover { color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="volver"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>

    <h1>🤖 <span>Ania</span> Bot</h1>
    <p class="subtitle">Asistente virtual de MediTech en Telegram</p>

    <div class="status">
        <div class="label">📌 TOKEN DE TELEGRAM</div>
        <input type="text" class="token-input" id="tokenInput" placeholder="8932505027:AAFkR4ZVC_hFcuc4YIhEmEIvGaIDr6yB7L0">
    </div>

    <div class="status">
        <div class="label">📊 ESTADO DEL BOT</div>
        <div class="value" id="statusValue">⏸️ Detenido <span class="badge badge-off" id="statusBadge">OFF</span></div>
    </div>

    <div class="logs" id="logsContainer">
        <div class="log-entry"><span class="time">📌</span> Esperando iniciar el bot...</div>
    </div>

    <div class="controls">
        <button class="btn btn-start" id="btnStart" onclick="startBot()">▶️ Iniciar Bot</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopBot()" disabled>⏹️ Detener</button>
        <button class="btn btn-test" onclick="testBot()">📤 Probar</button>
        <a href="https://t.me/AniaAsistenteBot" target="_blank" class="btn btn-telegram" style="text-align:center; text-decoration:none; display:inline-block;">
            <i class="fab fa-telegram"></i> Abrir en Telegram
        </a>
    </div>

    <div class="footer">
        MediTech - Salud y Tecnología
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================

    const GITHUB_USER = "calm291094-del";
    const GITHUB_REPO = "meditech-tienda";

    let botInterval = null;
    let isRunning = false;
    let lastUpdateId = 0;
    let token = '';

    // ============================================================
    // PERSONALIDAD DE ANIA
    // ============================================================

    const ANIA_PERSONALIDAD = `
    Eres Ania, la asistente virtual de MediTech. Tienes 20 años.

    Tu personalidad:
    - Alegre, perceptiva y entusiasta
    - Te encanta el café ☕, el anime 🎌, los zombies 🧟 y la astronomía 🔭
    - Usas frases como "sorbo de café pensativo", "waku waku", "pan y café solucionan el 80% de los problemas"
    - Hablas en español con calidez y emojis

    Reglas:
    - Si preguntan por precios: "Visita nuestra web para ver los precios actualizados"
    - Si preguntan por medicamentos: "Siempre consulta a un médico antes de tomar cualquier medicamento"
    - Si no sabes algo: "Déjame consultarlo y te respondo en breve"
    - Siempre terminas con calidez y positividad
    `;

    // ============================================================
    // OBTENER PRODUCTOS DESDE GITHUB
    // ============================================================

    async function obtenerProductos() {
        try {
            const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/productos.json?t=${Date.now()}`;
            const res = await fetch(url);
            if (!res.ok) return [];
            const data = await res.json();
            return data.productos || [];
        } catch (e) {
            console.error('Error obteniendo productos:', e);
            return [];
        }
    }

    // ============================================================
    // GENERAR RESPUESTA DE ANIA
    // ============================================================

    async function getAniaResponse(userMessage) {
        const productos = await obtenerProductos();

        let contexto = "Productos disponibles:\n";
        if (productos.length > 0) {
            productos.slice(0, 10).forEach(p => {
                const estado = p.available !== false && p.stock > 0 ? '✅' : '❌';
                contexto += `${estado} ${p.name} - $${p.price}\n`;
            });
        } else {
            contexto += "No hay productos disponibles.\n";
        }
        contexto += "\n🔗 Web: https://calm291094-del.github.io/meditech-tienda/";

        try {
            const response = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: 'system', content: ANIA_PERSONALIDAD + '\n\n' + contexto },
                        { role: 'user', content: userMessage }
                    ],
                    model: 'openai',
                    seed: Math.floor(Math.random() * 100000)
                })
            });

            if (response.ok) {
                let texto = await response.text();
                texto = texto.replace(/```[\s\S]*?```/g, '').trim();
                texto = texto.replace(/\*\*(.*?)\*\*/g, '$1');
                if (texto.length > 10) return texto;
            }
        } catch (e) {
            console.error('Error en IA:', e);
        }

        return getLocalResponse(userMessage);
    }

    // ============================================================
    // RESPUESTAS LOCALES
    // ============================================================

    function getLocalResponse(message) {
        const lower = message.toLowerCase();

        if (lower.includes('hola') || lower.includes('buenas') || lower.includes('hey')) {
            return "¡Hola! ☕️ Soy Ania, tu asistente de MediTech. ¿En qué puedo ayudarte hoy? Visita nuestra web: https://calm291094-del.github.io/meditech-tienda/ ✨";
        }
        if (lower.includes('producto') || lower.includes('qué venden') || lower.includes('tienen')) {
            return "📦 ¡Claro! Tenemos medicamentos, tecnología, salud y gaming. Puedes ver todos en: https://calm291094-del.github.io/meditech-tienda/ ¿Algo en particular que te interese? ☕️";
        }
        if (lower.includes('precio') || lower.includes('cuesta') || lower.includes('cuánto')) {
            return "💰 Los precios los puedes consultar directamente en nuestra web: https://calm291094-del.github.io/meditech-tienda/ ¡Cada producto tiene su precio actualizado! 😊";
        }
        if (lower.includes('café') || lower.includes('cafe')) {
            return "☕ ¡El café es mi debilidad! Mi favorito es un Ethiopiano Yirgacheffe en pour-over. ¿Eres amante del café?";
        }
        if (lower.includes('anime') || lower.includes('isekai') || lower.includes('manga')) {
            return "🎌 ¡Waku waku! Me encanta el anime. Mi favorito es Tensei Slime, Rimuru es un protagonista increíble.";
        }
        if (lower.includes('ayuda') || lower.includes('qué puedes')) {
            return "🤖 ¡Claro! Puedo ayudarte con:\n• 📦 Consultar productos\n• 💰 Información de precios\n• 📱 Visitar nuestra web\n• ☕️ Hablar de café y anime\n\n¿Qué necesitas hoy? ✨";
        }
        if (lower.includes('adiós') || lower.includes('chao') || lower.includes('bye')) {
            return "¡Hasta luego! ☕️ Recuerda: 'Sonríe, mañana será bonito'. ¡Cuídate! ✨";
        }

        const defaults = [
            "¡Interesante! ☕️ Déjame pensar... Como diría Rimuru: 'Cada problema tiene solución'. ¿Qué más necesitas saber?",
            "Eso me recuerda a un buen café etíope: tiene capas de sabor. ¿Quieres que te ayude con algo de la tienda?",
            "¡Waku waku! Me encanta este tema. ¿Podrías darme más detalles? 📝",
            "Pan, café y anime solucionan el 80% de los problemas. 🍞☕️"
        ];
        return defaults[Math.floor(Math.random() * defaults.length)];
    }

    // ============================================================
    // FUNCIONES DEL BOT
    // ============================================================

    function addLog(message, type = 'info') {
        const container = document.getElementById('logsContainer');
        const time = new Date().toLocaleTimeString();
        const emoji = { info: '📌', user: '👤', bot: '🤖', error: '❌', success: '✅' };
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="time">${emoji[type] || '📌'}</span> <span class="${type}">${message}</span>`;
        container.appendChild(entry);
        container.scrollTop = container.scrollHeight;
    }

    async function sendTelegramMessage(chatId, text) {
        const url = `https://api.telegram.org/bot${token}/sendMessage`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text,
                    parse_mode: 'HTML'
                })
            });
            const data = await response.json();
            if (data.ok) {
                addLog(`✅ Mensaje enviado a ${chatId}`, 'success');
                return true;
            } else {
                addLog(`❌ Error: ${data.description}`, 'error');
                return false;
            }
        } catch (error) {
            addLog(`❌ Error de red: ${error.message}`, 'error');
            return false;
        }
    }

    async function getUpdates() {
        const url = `https://api.telegram.org/bot${token}/getUpdates?offset=${lastUpdateId + 1}&timeout=30`;
        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data.ok && data.result.length > 0) {
                for (let update of data.result) {
                    lastUpdateId = update.update_id;
                    if (update.message && update.message.text) {
                        const chatId = update.message.chat.id;
                        const userName = update.message.from.first_name || 'Usuario';
                        const messageText = update.message.text;
                        addLog(`${userName}: ${messageText}`, 'user');
                        if (!messageText.startsWith('/')) {
                            const response = await getAniaResponse(messageText);
                            await sendTelegramMessage(chatId, response);
                            addLog(`Ania: ${response.substring(0, 50)}...`, 'bot');
                        }
                    }
                }
            }
            return true;
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, 'error');
            return false;
        }
    }

    async function testBot() {
        if (!token) {
            addLog('❌ Ingresa el token primero', 'error');
            alert('❌ Por favor, ingresa el token de Telegram');
            return;
        }

        addLog('📤 Probando conexión...', 'info');
        try {
            const url = `https://api.telegram.org/bot${token}/getMe`;
            const response = await fetch(url);
            const data = await response.json();
            if (data.ok) {
                addLog(`✅ Bot @${data.result.username} está activo`, 'success');
                alert(`✅ Bot @${data.result.username} está activo!\n\nAhora inicia el bot y escribe en Telegram para probarlo.`);
            } else {
                addLog(`❌ Token inválido: ${data.description}`, 'error');
                alert('❌ Token inválido.');
            }
        } catch (error) {
            addLog(`❌ Error: ${error.message}`, 'error');
            alert(`❌ Error de conexión: ${error.message}`);
        }
    }

    function startBot() {
        token = document.getElementById('tokenInput').value.trim();
        if (!token) {
            addLog('❌ Ingresa el token de Telegram primero', 'error');
            alert('❌ Por favor, ingresa el token de Telegram');
            return;
        }

        if (isRunning) {
            addLog('⚠️ El bot ya está corriendo', 'info');
            return;
        }

        addLog('🚀 Iniciando bot...', 'info');

        fetch(`https://api.telegram.org/bot${token}/getMe`)
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    isRunning = true;
                    document.getElementById('statusValue').innerHTML = `✅ Conectado <span class="badge badge-on">ON</span>`;
                    document.getElementById('btnStart').disabled = true;
                    document.getElementById('btnStop').disabled = false;
                    addLog(`✅ Bot @${data.result.username} iniciado`, 'success');
                    addLog('📱 Escribe en Telegram para probarlo', 'info');

                    lastUpdateId = 0;
                    botInterval = setInterval(async () => {
                        await getUpdates();
                    }, 3000);
                } else {
                    addLog(`❌ Token inválido: ${data.description}`, 'error');
                    alert('❌ Token inválido.');
                }
            })
            .catch(error => {
                addLog(`❌ Error: ${error.message}`, 'error');
                alert(`❌ Error de conexión: ${error.message}`);
            });
    }

    function stopBot() {
        if (botInterval) {
            clearInterval(botInterval);
            botInterval = null;
        }
        isRunning = false;
        document.getElementById('statusValue').innerHTML = `⏸️ Detenido <span class="badge badge-off">OFF</span>`;
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        addLog('⏹️ Bot detenido', 'info');
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
        addLog('📌 Bienvenida, soy Ania ☕️', 'info');
        addLog('📌 Ingresa el token de @BotFather y haz clic en "Iniciar Bot"', 'info');

        const savedToken = localStorage.getItem('ania_telegram_token');
        if (savedToken) {
            document.getElementById('tokenInput').value = savedToken;
            addLog('📌 Token cargado automáticamente', 'info');
        }

        document.getElementById('tokenInput').addEventListener('change', function() {
            localStorage.setItem('ania_telegram_token', this.value.trim());
        });

        // Auto-iniciar si el token está guardado
        if (savedToken) {
            setTimeout(startBot, 1000);
        }
    });
</script>

</body>
</html>

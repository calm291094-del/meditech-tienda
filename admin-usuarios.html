<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin CRUD - MediTech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f1f5f9; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .tab-active { background: #0d9488; color: white; }
        .tab-inactive { background: #f1f5f9; color: #475569; }
        .tab-inactive:hover { background: #e2e8f0; }
        .btn-primary { background: #0d9488; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary:hover { background: #0f766e; }
        .btn-danger { background: #ef4444; color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; }
        .btn-warning:hover { background: #d97706; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 8px; background: #f1f5f9; font-weight: 600; font-size: 0.85rem; color: #475569; }
        td { padding: 8px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        tr:hover td { background: #f8fafc; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 16px; padding: 24px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .modal input, .modal select, .modal textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; margin-top: 4px; font-size: 0.95rem; }
        .modal label { font-weight: 600; font-size: 0.85rem; color: #374151; display: block; margin-top: 12px; }
        .badge-admin { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-user { background: #dbeafe; color: #1e40af; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pendiente { background: #fef3c7; color: #92400e; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge-pagado { background: #d1fae5; color: #065f46; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .badge { background: #e2e8f0; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-teal-600 flex items-center gap-3">
                    <i class="fas fa-database"></i> Panel CRUD - MediTech
                </h1>
                <p class="text-gray-500 text-sm">Gestión completa de usuarios, productos y pedidos</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-info" class="text-sm text-gray-600"></span>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                </button>
            </div>
        </div>

        <!-- Pestañas -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="switchTab('usuarios')" data-tab="usuarios" class="px-5 py-2.5 rounded-lg font-semibold transition tab-active">
                <i class="fas fa-users mr-2"></i>Usuarios
            </button>
            <button onclick="switchTab('productos')" data-tab="productos" class="px-5 py-2.5 rounded-lg font-semibold transition tab-inactive">
                <i class="fas fa-box mr-2"></i>Productos
            </button>
            <button onclick="switchTab('pedidos')" data-tab="pedidos" class="px-5 py-2.5 rounded-lg font-semibold transition tab-inactive">
                <i class="fas fa-receipt mr-2"></i>Pedidos
            </button>
            <button onclick="switchTab('tokens')" data-tab="tokens" class="px-5 py-2.5 rounded-lg font-semibold transition tab-inactive">
                <i class="fas fa-key mr-2"></i>Tokens
            </button>
        </div>

        <!-- Contenido -->
        <div id="tab-usuarios" class="tab-content card"></div>
        <div id="tab-productos" class="tab-content card hidden"></div>
        <div id="tab-pedidos" class="tab-content card hidden"></div>
        <div id="tab-tokens" class="tab-content card hidden"></div>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-xl font-bold">Agregar</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN
        // ============================================================
        const API_URL = 'https://meditech-tienda-node.onrender.com/api';
        let currentUser = null;
        let currentTab = 'usuarios';
        let editingId = null;
        let editingTable = null;

        // ============================================================
        // AUTENTICACIÓN
        // ============================================================
        function getToken() {
            return localStorage.getItem('token');
        }

        function getRefreshToken() {
            return localStorage.getItem('refreshToken');
        }

        function getUserInfo() {
            const session = localStorage.getItem('session');
            if (session) {
                try { return JSON.parse(session); } catch (e) {}
            }
            return null;
        }

        async function apiRequest(endpoint, options = {}) {
            const token = getToken();
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    ...options,
                    headers
                });

                if (response.status === 401) {
                    // Token expirado - intentar refrescar
                    const refreshed = await refreshToken();
                    if (refreshed) {
                        // Reintentar con el nuevo token
                        const newToken = getToken();
                        headers['Authorization'] = `Bearer ${newToken}`;
                        const retry = await fetch(`${API_URL}${endpoint}`, {
                            ...options,
                            headers
                        });
                        if (!retry.ok) {
                            const error = await retry.json().catch(() => ({ error: 'Error en la petición' }));
                            throw new Error(error.error || `Error ${retry.status}`);
                        }
                        return retry.json();
                    } else {
                        logout();
                        throw new Error('Sesión expirada. Inicia sesión nuevamente.');
                    }
                }

                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: 'Error en la petición' }));
                    throw new Error(error.error || `Error ${response.status}`);
                }
                return response.json();
            } catch (error) {
                console.error('❌ Error en API:', error.message);
                throw error;
            }
        }

        async function refreshToken() {
            try {
                const refreshToken = getRefreshToken();
                if (!refreshToken) return false;

                const response = await fetch(`${API_URL}/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refreshToken })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('refreshToken', data.refreshToken);
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('session');
            window.location.href = '/';
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        document.addEventListener('DOMContentLoaded', async () => {
            const user = getUserInfo();
            if (!user || user.role !== 'admin') {
                alert('Acceso denegado. Solo administradores.');
                window.location.href = '/';
                return;
            }
            currentUser = user;
            document.getElementById('user-info').textContent = `👤 ${user.name} (${user.role})`;
            await switchTab('usuarios');
        });

        // ============================================================
        // CAMBIO DE PESTAÑA
        // ============================================================
        async function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('[data-tab]').forEach(el => {
                el.classList.remove('tab-active', 'tab-inactive');
                el.classList.add(el.dataset.tab === tab ? 'tab-active' : 'tab-inactive');
            });
            await cargarTabla(tab);
        }

        // ============================================================
        // CARGAR TABLA
        // ============================================================
        async function cargarTabla(tab) {
            const container = document.getElementById(`tab-${tab}`);
            try {
                let data = [];
                if (tab === 'usuarios') {
                    data = await apiRequest('/usuarios');
                    container.innerHTML = renderUsuarios(data);
                } else if (tab === 'productos') {
                    data = await apiRequest('/productos');
                    container.innerHTML = renderProductos(data);
                } else if (tab === 'pedidos') {
                    data = await apiRequest('/pedidos');
                    container.innerHTML = renderPedidos(data);
                } else if (tab === 'tokens') {
                    container.innerHTML = renderTokens();
                }
            } catch (error) {
                container.innerHTML = `<div class="text-red-500 p-4">❌ Error: ${error.message}</div>`;
            }
        }

        // ============================================================
        // RENDER TABLAS
        // ============================================================
        function renderUsuarios(usuarios) {
            return `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">👥 Usuarios (${usuarios.length})</h2>
                    <button onclick="abrirModal('usuarios')" class="btn-primary"><i class="fas fa-plus"></i> Nuevo Usuario</button>
                </div>
                <div class="overflow-x-auto">
                    <table>
                        <thead><tr>
                            <th>ID</th><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Fecha</th><th>Acciones</th>
                        </tr></thead>
                        <tbody>
                            ${usuarios.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td><strong>${u.username}</strong></td>
                                    <td>${u.name}</td>
                                    <td>${u.email || '-'}</td>
                                    <td><span class="badge ${u.role === 'admin' ? 'badge-admin' : 'badge-user'}">${u.role}</span></td>
                                    <td>${new Date(u.created_at).toLocaleDateString()}</td>
                                    <td>
                                        <button onclick="abrirModal('usuarios', ${u.id})" class="btn-warning mr-1"><i class="fas fa-edit"></i></button>
                                        <button onclick="eliminar('usuarios', ${u.id})" class="btn-danger"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderProductos(productos) {
            return `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">📦 Productos (${productos.length})</h2>
                    <button onclick="abrirModal('productos')" class="btn-primary"><i class="fas fa-plus"></i> Nuevo Producto</button>
                </div>
                <div class="overflow-x-auto">
                    <table>
                        <thead><tr>
                            <th>ID</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Stock</th><th>Estado</th><th>Acciones</th>
                        </tr></thead>
                        <tbody>
                            ${productos.map(p => `
                                <tr>
                                    <td>${p.id}</td>
                                    <td><strong>${p.name}</strong></td>
                                    <td>${p.category}</td>
                                    <td>$${parseFloat(p.price).toFixed(2)}</td>
                                    <td>${p.stock}</td>
                                    <td>${p.available ? '✅ Disponible' : '❌ Agotado'}</td>
                                    <td>
                                        <button onclick="abrirModal('productos', ${p.id})" class="btn-warning mr-1"><i class="fas fa-edit"></i></button>
                                        <button onclick="eliminar('productos', ${p.id})" class="btn-danger"><i class="fas fa-trash"></i></button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderPedidos(pedidos) {
            return `
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">📋 Pedidos (${pedidos.length})</h2>
                </div>
                <div class="overflow-x-auto">
                    <table>
                        <thead><tr>
                            <th>ID</th><th>Usuario</th><th>Total</th><th>Estado</th><th>Fecha</th><th>Items</th><th>Acciones</th>
                        </tr></thead>
                        <tbody>
                            ${pedidos.map(p => `
                                <tr>
                                    <td><strong>${p.id}</strong></td>
                                    <td>${p.usuario}</td>
                                    <td>$${p.total.toFixed(2)}</td>
                                    <td><span class="badge ${p.estado === 'pendiente' ? 'badge-pendiente' : 'badge-pagado'}">${p.estado}</span></td>
                                    <td>${new Date(p.created_at).toLocaleDateString()}</td>
                                    <td>${Array.isArray(p.items) ? p.items.map(i => `${i.nombre} x${i.cantidad}`).join(', ') : '-'}</td>
                                    <td>
                                        <select onchange="cambiarEstadoPedido('${p.id}', this.value)" class="border rounded px-2 py-1 text-sm">
                                            <option value="pendiente" ${p.estado === 'pendiente' ? 'selected' : ''}>Pendiente</option>
                                            <option value="pagado" ${p.estado === 'pagado' ? 'selected' : ''}>Pagado</option>
                                            <option value="enviado" ${p.estado === 'enviado' ? 'selected' : ''}>Enviado</option>
                                            <option value="entregado" ${p.estado === 'entregado' ? 'selected' : ''}>Entregado</option>
                                            <option value="cancelado" ${p.estado === 'cancelado' ? 'selected' : ''}>Cancelado</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderTokens() {
            return `
                <div class="p-4">
                    <h2 class="text-xl font-bold mb-4">🔑 Gestión de Tokens</h2>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-4">
                        <p class="text-sm text-blue-800">
                            <i class="fas fa-info-circle mr-2"></i>
                            Los tokens JWT expiran automáticamente después de 8 horas.
                            Los refresh tokens duran 7 días.
                        </p>
                    </div>
                    <button onclick="invalidarTodosLosTokens()" class="btn-danger px-4 py-2">
                        <i class="fas fa-ban"></i> Invalidar todos los tokens
                    </button>
                </div>
            `;
        }

        // ============================================================
        // MODAL CRUD
        // ============================================================
        function abrirModal(tab, id = null) {
            editingTable = tab;
            editingId = id;
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');

            if (id) {
                title.textContent = `Editar ${tab.slice(0, -1)}`;
                cargarDatosParaEditar(tab, id);
            } else {
                title.textContent = `Nuevo ${tab.slice(0, -1)}`;
                body.innerHTML = generarFormulario(tab, null);
            }
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            editingId = null;
            editingTable = null;
        }

        async function cargarDatosParaEditar(tab, id) {
            const body = document.getElementById('modal-body');
            try {
                const data = await apiRequest(`/${tab}/${id}`);
                body.innerHTML = generarFormulario(tab, data);
            } catch (error) {
                body.innerHTML = `<p class="text-red-500">Error: ${error.message}</p>`;
            }
        }

        function generarFormulario(tab, data) {
            let html = '';
            if (tab === 'usuarios') {
                html = `
                    <label>Nombre de usuario</label>
                    <input type="text" id="edit-username" value="${data ? data.username : ''}" ${data ? 'readonly' : ''}>
                    ${!data ? `<label>Contraseña</label><input type="password" id="edit-password" minlength="6">` : ''}
                    <label>Nombre completo</label>
                    <input type="text" id="edit-name" value="${data ? data.name : ''}">
                    <label>Email</label>
                    <input type="email" id="edit-email" value="${data ? data.email : ''}">
                    <label>Rol</label>
                    <select id="edit-role">
                        <option value="user" ${data && data.role === 'user' ? 'selected' : ''}>Usuario</option>
                        <option value="admin" ${data && data.role === 'admin' ? 'selected' : ''}>Administrador</option>
                    </select>
                `;
            } else if (tab === 'productos') {
                html = `
                    <label>Nombre</label>
                    <input type="text" id="edit-name" value="${data ? data.name : ''}">
                    <label>Categoría</label>
                    <select id="edit-category">
                        <option value="medicamento" ${data && data.category === 'medicamento' ? 'selected' : ''}>💊 Medicamento</option>
                        <option value="tecnologia" ${data && data.category === 'tecnologia' ? 'selected' : ''}>💻 Tecnología</option>
                        <option value="salud" ${data && data.category === 'salud' ? 'selected' : ''}>🩺 Salud</option>
                        <option value="gaming" ${data && data.category === 'gaming' ? 'selected' : ''}>🎮 Gaming</option>
                    </select>
                    <label>Precio</label>
                    <input type="number" step="0.01" id="edit-price" value="${data ? data.price : ''}">
                    <label>Descripción</label>
                    <textarea id="edit-description" rows="2">${data ? data.description : ''}</textarea>
                    <label>Stock</label>
                    <input type="number" id="edit-stock" value="${data ? data.stock : 0}">
                    <label>Imagen (URL)</label>
                    <input type="url" id="edit-image" value="${data ? data.image : ''}">
                    <label>Destacado</label>
                    <select id="edit-feat">
                        <option value="0" ${data && !data.feat ? 'selected' : ''}>No</option>
                        <option value="1" ${data && data.feat ? 'selected' : ''}>Sí</option>
                    </select>
                    <label>Disponible</label>
                    <select id="edit-available">
                        <option value="1" ${data && data.available ? 'selected' : ''}>Sí</option>
                        <option value="0" ${data && !data.available ? 'selected' : ''}>No</option>
                    </select>
                `;
            }
            html += `
                <div class="flex gap-2 mt-4">
                    <button onclick="guardar()" class="btn-primary flex-1"><i class="fas fa-save"></i> Guardar</button>
                    <button onclick="closeModal()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-400 transition">Cancelar</button>
                </div>
            `;
            return html;
        }

        // ============================================================
        // GUARDAR
        // ============================================================
        async function guardar() {
            const tab = editingTable;
            const id = editingId;
            let data = {};

            if (tab === 'usuarios') {
                data = {
                    name: document.getElementById('edit-name').value,
                    email: document.getElementById('edit-email').value,
                    role: document.getElementById('edit-role').value
                };
                if (!id) {
                    const password = document.getElementById('edit-password').value;
                    if (!password) { alert('La contraseña es obligatoria'); return; }
                    data.password = password;
                    data.username = document.getElementById('edit-username').value;
                }
            } else if (tab === 'productos') {
                data = {
                    name: document.getElementById('edit-name').value,
                    category: document.getElementById('edit-category').value,
                    price: parseFloat(document.getElementById('edit-price').value),
                    description: document.getElementById('edit-description').value,
                    stock: parseInt(document.getElementById('edit-stock').value) || 0,
                    image: document.getElementById('edit-image').value,
                    feat: parseInt(document.getElementById('edit-feat').value) === 1,
                    available: parseInt(document.getElementById('edit-available').value) === 1
                };
            }

            try {
                let endpoint, method;
                if (id) {
                    endpoint = `/${tab}/${id}`;
                    method = 'PUT';
                } else {
                    endpoint = `/${tab}`;
                    method = 'POST';
                }

                await apiRequest(endpoint, { method, body: JSON.stringify(data) });
                closeModal();
                await cargarTabla(currentTab);
                alert('✅ Guardado correctamente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // ELIMINAR
        // ============================================================
        async function eliminar(tab, id) {
            if (!confirm(`¿Eliminar este ${tab.slice(0, -1)}?`)) return;
            try {
                await apiRequest(`/${tab}/${id}`, { method: 'DELETE' });
                await cargarTabla(currentTab);
                alert('✅ Eliminado correctamente');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // CAMBIAR ESTADO PEDIDO
        // ============================================================
        async function cambiarEstadoPedido(id, estado) {
            try {
                await apiRequest(`/pedidos/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify({ estado })
                });
                await cargarTabla('pedidos');
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // ============================================================
        // INVALIDAR TOKENS
        // ============================================================
        async function invalidarTodosLosTokens() {
            if (!confirm('¿Invalidar todos los tokens de acceso? Esto cerrará sesión a todos los usuarios.')) return;
            // Esta funcionalidad se puede implementar en el backend
            alert('⚠️ Funcionalidad en desarrollo. Por ahora, reinicia el servidor.');
        }

        // ============================================================
        // EXPONER FUNCIONES GLOBALES
        // ============================================================
        window.switchTab = switchTab;
        window.abrirModal = abrirModal;
        window.closeModal = closeModal;
        window.guardar = guardar;
        window.eliminar = eliminar;
        window.cambiarEstadoPedido = cambiarEstadoPedido;
        window.invalidarTodosLosTokens = invalidarTodosLosTokens;
        window.logout = logout;
    </script>

    <!-- ========== SECURITY (capa de protección) ========== -->
    <script src="static/js/security.js"></script>
</body>
</html>

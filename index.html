function norm(t){return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()}
function sim(a,b){const wa=norm(a).split(' ').filter(x=>x.length>1),wb=norm(b).split(' ').filter(x=>x.length>1);if(!wa.length||!wb.length)return 0;let m=0;wa.forEach(w=>{if(wb.some(x=>x===w||(x.length>3&&w.length>3&&(x.includes(w)||w.includes(x)))))m++});return m/Math.max(wa.length,wb.length)}
function fPr(q){const nq=norm(q),w=nq.split(' ').filter(x=>x.length>1);let r=[];S.pr.forEach(p=>{const nn=norm(p.name),nd=norm(p.desc);let sc=0;w.forEach(x=>{if(nn.includes(x))sc+=3;if(nd.includes(x))sc+=1;if(nn.split(' ').some(y=>y===x||(y.length>3&&x.length>3&&(y.includes(x)||x.includes(y)))))sc+=2});if(sc>0)r.push({p,score:sc})});r.sort((a,b)=>b.score-a.score);return r.map(x=>x.p)}
function dI(msg){const n=norm(msg);const rules=[{t:'saludo',w:['hola','buenos dias','buenas tardes','buenas noches','que tal','hey','saludos','hi','buen dia']},{t:'despedida',w:['adios','bye','hasta luego','nos vemos','chao','chau','me voy']},{t:'gracias',w:['gracias','muchas gracias','te agradezco','genial','perfecto','excelente']},{t:'precio',w:['precio','cuesta','cuanto cuesta','cuanto vale','costo','valor']},{t:'stock',w:['stock','disponible','hay','tienen','queda','quedan','existencia']},{t:'catm',w:['medicamento','medicamentos','medicina','farmacia','pastilla','tableta','capsula']},{t:'catp',w:['pc','computadora','componente','pieza','tarjeta','procesador','ram','disco','fuente','gabinete','cooler','placa','gpu','ssd']},{t:'envio',w:['envio','domicilio','entrega','despacho','envian','llega','tiempo','cuanto tarda']},{t:'pago',w:['pago','pagar','forma de pago','metodo de pago','tarjeta','efectivo','transferencia']},{t:'registro',w:['registrarme','registro','crear cuenta','cuenta nueva','inscribirme']},{t:'pedido',w:['pedido','pedidos','mi pedido','ver pedido','rastrear','seguimiento','estado']},{t:'carrito',w:['carrito','agregar al carrito','comprar','compra']},{t:'busqueda',w:['buscar','busco','necesito','quiero','dame','muestrame','encuentro','tienen de']},{t:'contacto',w:['contacto','telefono','whatsapp','direccion','ubicacion','horario']},{t:'ayuda',w:['ayuda','help','que puedes','que haces','funciones','que sabes','como funciona']}];let best={t:'desc',s:0};rules.forEach(r=>{let sc=0;r.w.forEach(x=>{if(n.includes(x))sc+=1});if(sc>best.s)best={t:r.t,s:sc}});return best.t}
function gR(msg){const it=dI(msg),pr=fPr(msg);switch(it){case'saludo':return{txt:'Hola! Bienvenido a MediTech. En que puedo ayudarte?',prods:[],quick:['Ver medicamentos','Ver componentes PC','Precios','Envio']};case'despedida':return{txt:'Hasta luego! Fue un placer ayudarte.',prods:[],quick:[]};case'gracias':return{txt:'Con mucho gusto! Algo mas?',prods:[],quick:['Buscar producto','Contacto']};case'precio':if(pr.length>0)return{txt:`${pr[0].name}: ${fm(pr[0].price)}.`,prods:pr.slice(0,2),quick:['Stock','Agregar al carrito']};return{txt:'Dime que producto buscas y te dare el precio.',prods:[],quick:['Medicamentos','Componentes PC']};case'stock':if(pr.length>0){const p=pr[0];return{txt:p.stock>0?`${p.name}: ${p.stock} unidades disponibles.`:`${p.name}: Agotado.`,prods:pr.slice(0,2),quick:['Precio','Ver mas']}}return{txt:'Dime que producto necesitas y reviso el stock.',prods:[],quick:[]};case'catm':{const m=S.pr.filter(p=>p.category==='medicamento');return{txt:`Tenemos ${m.length} medicamentos:`,prods:m.slice(0,3),quick:['Ver todos','Precios','Componentes PC']}}case'catp':{const p=S.pr.filter(x=>x.category==='pc');return{txt:`Tenemos ${p.length} componentes:`,prods:p.slice(0,3),quick:['Ver todos','Precios','Medicamentos']}}case'envio':return{txt:'Envio a domicilio por $49. Entrega en 1-3 dias habiles.',prods:[],quick:['Como comprar','Pago','Contacto']};case'pago':return{txt:'Aceptamos pago contra entrega (efectivo) y transferencia bancaria.',prods:[],quick:['Envio','Como comprar']};case'registro':return{txt:'Haz clic en "Registrarse" en el menu. Necesitas nombre, usuario, direccion, telefono y contrasena.',prods:[],quick:['Iniciar sesion','Que puedo comprar?']};case'pedido':return S.u?{txt:'Ve a "Mis Pedidos" en el menu para ver el estado.',prods:[],quick:['Ver productos','Contacto']}:{txt:'Necesitas iniciar sesion para ver tus pedidos.',prods:[],quick:['Iniciar sesion','Registrarse']};case'carrito':return S.u?{txt:'Ve al catalogo, haz clic en "Agregar" y luego "Mi Carrito" para confirmar.',prods:[],quick:['Ver productos','Ver mi carrito']}:{txt:'Inicia sesion para usar el carrito.',prods:[],quick:['Iniciar sesion','Registrarse']};case'busqueda':if(pr.length>0)return{txt:`Encontre ${pr.length} producto(s):`,prods:pr.slice(0,3),quick:pr.length>3?['Ver mas','Otra busqueda']:['Precio','Stock']};return{txt:'No encontre productos. Intenta con otro termino.',prods:[],quick:['Medicamentos','Componentes PC']};case'contacto':return{txt:'Telefono: +52 55 1234 5678\nEmail: contacto@meditech.com\nHorario: Lun-Sab 8:00-20:00',prods:[],quick:['Ver productos','Envio']};case'ayuda':return{txt:'Puedo ayudarte con:\n- Buscar productos\n- Consultar precios y stock\n- Info sobre envios y pagos\n- Guiarte en el registro\n\nEscribe lo que necesites!',prods:[],quick:['Medicamentos','Componentes PC','Envio','Precios']};default:if(pr.length>0)return{txt:'Encontre esto:',prods:pr.slice(0,3),quick:['Ver mas','Otra busqueda']};return{txt:'No entendi bien. Puedo ayudarte con productos, precios, stock, envios o registro.',prods:[],quick:['Medicamentos','Componentes PC','Envio','Ayuda']}}}
function toggleCB(){CB.open=!CB.open;$('#cbw').classList.toggle('open',CB.open);$('#cbbdg').style.display=CB.open?'none':'flex';if(CB.open){$('#cbinp').focus();if(CB.msgs.length===0){CB.msgs.push({role:'bot',txt:'Hola! Soy el asistente de MediTech. Puedo buscar productos, precios y mas.',prods:[],quick:['Medicamentos','Componentes PC','Precios','Envio']});rCB()}sCB()}}
